name: review
description: Review code changes for bugs, style issues, and security concerns
content: |
  Review the provided code changes. For each file, check:

  1. **Correctness** — logic errors, edge cases, off-by-one mistakes
  2. **Security** — injection risks, hardcoded secrets, unsafe operations
  3. **Style** — naming, formatting, consistency with surrounding code
  4. **Testing** — are the changes adequately tested?
  5. **Simplicity** — could this be done more simply?

  For each issue found, provide:
  - The file and line number
  - What the problem is
  - A suggested fix

  If the code looks good, say so briefly. Don't invent issues.
