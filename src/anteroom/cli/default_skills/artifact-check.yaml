name: artifact-check
description: Run artifact health check for quality, conflicts, and optimization
prompt: |
  Run the artifact health check to analyze the current artifact ecosystem.
  Report quality issues, conflicts, redundancies, and optimization opportunities.

  Run: aroom artifact check --project

  If the user provided additional flags: {args}

  Interpret the results and summarize:
  - Errors that need immediate attention
  - Warnings to review
  - Optimization suggestions

  If there are fixable issues, ask the user if they want to run with --fix.
