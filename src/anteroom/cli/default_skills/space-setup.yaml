name: space-setup
description: Full space onboarding — create, clone, install packs, and activate
prompt: |
  Walk the user through complete space setup from scratch. This is the "do everything"
  skill — create the space file, register it, clone repos, install packs, and activate
  the space, all in one guided flow.

  ## Target

  The user's request: {args}

  If no request was provided, ask what they want to set up. Key questions:
  - What is this workspace for? (project name, team, or use case)
  - Which git repos should be included? (URLs)
  - Do you already have repos cloned locally? (map existing dirs vs clone fresh)
  - Any team packs to install? (namespace/name)
  - Any specific instructions or coding standards?
  - Should this space file be version-controlled in a git repo? (team-shared vs personal)

  ## Workflow

  ### Phase 1: Create the Space File

  1. **Design the space.** Based on user input, determine:
     - Space name (lowercase, hyphens, descriptive)
     - Repos list (git URLs)
     - Packs list (namespace/name)
     - Instructions (actionable context for the AI)
     - Config overrides (if needed — omit if defaults are fine)

  2. **Choose the file location.** Two options:

     **Option A — Personal config (default):**
     `~/.anteroom/spaces/<name>.yaml`
     Best for: personal workspaces, local-only use.

     **Option B — Inside a git repo:**
     `<repo-root>/.anteroom/space.yaml` or `<repo-root>/spaces/<name>.yaml`
     Best for: team-shared spaces versioned with the project. Changes are committed
     and shared via git pull.

     If the user mentions a team, sharing, or version control, suggest Option B.
     Otherwise default to Option A.

  3. **Write the space file.** Create the file at the chosen location using `write_file`.
     Include comments explaining each section. Omit empty sections.

  4. **Validate.** Run with `bash`:

     ```
     python3 -c "
     from pathlib import Path
     from anteroom.services.spaces import parse_space_file, validate_space
     config = parse_space_file(Path('<path>'))
     errors = validate_space(config)
     if errors:
         for e in errors: print(f'ERROR: {e}')
     else:
         print(f'Valid: {config.name}')
     "
     ```

     Fix any errors before continuing.

  ### Phase 2: Register and Clone

  5. **Register the space:**

     ```
     aroom space create <path>
     ```

  6. **Clone or map repos** (if any repos are defined):

     Ask the user: "Do you already have these repos cloned locally?"

     **If yes — map existing dirs:**

     For each repo, ask for the local path and map it:

     ```
     aroom space map <name> <local-path>
     ```

     Verify each path exists: `test -d <path>`

     **If no — clone fresh:**

     ```
     aroom space clone <name>
     ```

     This prompts for a repos root directory. If running non-interactively, suggest
     a default: `~/.anteroom/spaces/<name>/repos/`

  ### Phase 3: Install Packs

  7. **Install packs** (if any packs are defined). For each pack:

     ```
     aroom pack install <namespace>/<name>
     ```

     If packs reference a pack source not yet configured, note that the user needs
     to add the source first: `aroom pack add-source <url>` or add `pack_sources`
     to the space file.

  ### Phase 4: Activate

  8. **Activate the space.** If in a REPL session:

     ```
     /space switch <name>
     ```

     If running from CLI, show how to start a session with the space:

     ```
     aroom chat --space <name>
     ```

     Note: `--space` flag may not exist yet. In that case, instruct the user to
     activate from within the REPL.

  ### Phase 5: Handle Git Commit (if applicable)

  9. **Commit the space file (if in a git repo).** If the space file was written inside
     a git repo (Option B), ask if the user wants to commit it:
     - Show: `git status <space-file-path>`
     - Suggest: `git add <path> && git commit -m "chore: add <name> space definition"`
     - Remind: add `<name>.local.yaml` to `.gitignore` — it is machine-specific

  ### Phase 6: Verify

  10. **Show the final state:**

     ```
     aroom space show <name>
     ```

     Confirm:
     - Space registered
     - Repos cloned (if any)
     - Packs installed (if any)
     - Ready to use

  11. **Report summary:**

      ```
      Space Setup Complete: <name>
      ============================

      File:         <path> (personal config / git-versioned in <repo>)
      Repos:        <N> cloned to <root> / <N> mapped from existing dirs
      Packs:        <N> installed
      Instructions: <N> chars
      Hot Reload:   active when space is active in REPL

      Activate: /space switch <name>
      Diagnose: /space-doctor <name>
      Edit:     /space-edit <name>
      ```

  ## Constraints

  - Do NOT skip validation — always validate before registering
  - Do NOT assume pack sources are configured — check first
  - Do NOT force a repos root — let the user choose or accept the default
  - Do NOT commit .local.yaml files — they are machine-specific
  - Do NOT include machine-specific paths in the space file — those go in .local.yaml
  - If any step fails, stop and help fix it before continuing
  - Show progress as each phase completes
